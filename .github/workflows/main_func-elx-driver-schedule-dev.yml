name: Build and deploy Driver Schedule API

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Build
        shell: pwsh
        run: npm run build

      - name: Remove dev dependencies
        shell: pwsh
        run: npm prune --omit=dev

      - name: Prepare deploy package
        shell: pwsh
        run: |
          mkdir deploy
          Copy-Item dist deploy/dist -Recurse
          Copy-Item node_modules deploy/node_modules -Recurse
          Copy-Item host.json deploy/
          Copy-Item package.json deploy/
          Copy-Item package-lock.json deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: deploy

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.__clientidsecretname__ }}
          tenant-id: ${{ secrets.__tenantidsecretname__ }}
          subscription-id: ${{ secrets.__subscriptionidsecretname__ }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-elx-driver-schedule-dev'
          slot-name: 'Production'
          package: deploy
